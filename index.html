<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content">
    <meta name="color-scheme" content="dark">
    <title>SocialConnect - Connexion</title>
<link rel="icon" type="image/svg+xml" href="socialconnect-icon.svg">
<link rel="apple-touch-icon" href="socialconnect-icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B3D2E">
<script>
    // ============ GARDE DE SESSION ============
    // S'exécute avant l'affichage du formulaire de connexion.
    // Si une session existe déjà (utilisateur connecté), on renvoie
    // immédiatement vers l'accueil — par bouton retour, cache du
    // navigateur (bfcache), rechargement, lien direct, etc.
    // La clé doit rester identique à STORAGE_KEY dans accueil.html.
    (function () {
        var SESSION_KEY = 'socialconnect_state_v1';
        function redirectIfLoggedIn() {
            try {
                if (localStorage.getItem(SESSION_KEY)) {
                    window.location.replace('accueil.html');
                }
            } catch (e) { /* localStorage indisponible : on laisse afficher la connexion */ }
        }
        redirectIfLoggedIn();
        // Couvre le cas où le navigateur restaure la page depuis le
        // cache (bfcache) sans ré-exécuter les scripts au chargement.
        window.addEventListener('pageshow', function (e) {
            if (e.persisted) redirectIfLoggedIn();
        });
    })();
</script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body { min-height: 100vh; min-height: 100dvh; }

        body {
            background-color: #0b141a;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            padding-top: max(60px, 12vh);
            overflow-x: hidden;
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }

        button:focus-visible, input:focus-visible {
            outline: 2px solid #00a884;
            outline-offset: 2px;
        }

        .auth-container { width: 100%; max-width: 400px; text-align: center; }

        .logo-container {
            width: 90px;
            height: 90px;
            background-color: #00a884;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .logo-container svg { width: 45px; height: 45px; fill: white; }

        .auth-card {
            background: #111b21;
            padding: 30px 25px;
            border-radius: 16px;
            border: 1px solid #222e35;
        }

        h2 { color: #e9edef; margin-bottom: 12px; font-size: 26px; font-weight: bold; }

        .subtitle {
            color: #00a884;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #8696a0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 14px 16px;
            background-color: #2a3942;
            border: 1px solid #2a3942;
            border-radius: 8px;
            font-size: 16px;
            color: #e9edef;
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 1px;
        }

        .phone-input-row { display: flex; gap: 8px; }
        .phone-input-row input { flex: 1; min-width: 0; }

        .country-select {
            flex-grow: 0;
            flex-shrink: 0;
            flex-basis: 100px;
            width: 100px;
            min-width: 100px;
            max-width: 100px;
            padding: 14px 22px 14px 8px;
            background-color: #2a3942;
            border: 1px solid #2a3942;
            border-radius: 8px;
            font-size: 14px;
            color: #e9edef;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238696a0'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 4px center;
            background-size: 16px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .country-select:focus { border-color: #00a884; }

        .input-group input:focus { border-color: #00a884; }
        .input-group input.invalid { border-color: #f87171; }

        .field-error {
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #00a884;
            color: #111b21;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background-color: transparent;
            color: #8696a0;
            margin-top: 15px;
            font-size: 14px;
            text-decoration: underline;
            border-radius: 0;
        }

        .btn-secondary:disabled { text-decoration: none; opacity: 0.6; }

        .demo-code-box {
            background-color: #0a332c;
            border: 1px dashed #00a884;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .demo-code-label { font-size: 12px; color: #8696a0; margin-bottom: 8px; line-height: 1.4; }

        .demo-code-value {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        #demo-otp-display {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #00a884;
            font-family: "SFMono-Regular", Consolas, monospace;
        }

        .copy-code-btn {
            width: auto;
            flex-shrink: 0;
            padding: 8px 12px;
            border-radius: 8px;
            background-color: #202c33;
            color: #e9edef;
            font-size: 16px;
        }

        .hidden { display: none !important; }

        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-8px); }
            40%, 60% { transform: translateX(8px); }
        }

        .shake { animation: shake 0.4s; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: #202c33;
            color: #e9edef;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 10000;
            max-width: 85vw;
            text-align: center;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .otp-toast {
            position: fixed;
            top: max(16px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background-color: #111b21;
            border: 1px solid #00a884;
            color: #e9edef;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 10001;
            max-width: 90vw;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .otp-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .otp-toast .otp-toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background-color: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #0b141a;
            flex-shrink: 0;
        }

        .otp-toast .otp-toast-text { display: flex; flex-direction: column; text-align: left; }
        .otp-toast .otp-toast-title { font-size: 12px; color: #8696a0; }
        .otp-toast .otp-toast-code {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 5px;
            color: #00a884;
            font-family: "SFMono-Regular", Consolas, monospace;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-container">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
        </div>

        <div id="phone-screen" class="auth-card">
            <h2>SocialConnect</h2>
            <p class="subtitle">Connectez-vous de manière sécurisée grâce à votre numéro de téléphone.</p>
            <form id="phone-form" novalidate>
                <div class="input-group">
                    <label for="phone-number">Numéro de téléphone</label>
                    <div class="phone-input-row">
                        <select id="country-code" class="country-select" aria-label="Indicatif du pays">
                            <option value="+261" data-min="9" data-placeholder="34 12 345 67" selected>🇲🇬 +261</option>
                            <option value="+269" data-min="7" data-placeholder="321 23 45">🇰🇲 +269</option>
                            <option value="+33" data-min="9" data-placeholder="6 12 34 56 78">🇫🇷 +33</option>
                            <option value="+230" data-min="7" data-placeholder="5712 3456">🇲🇺 +230</option>
                            <option value="+262" data-min="9" data-placeholder="692 12 34 56">🇷🇪 +262</option>
                        </select>
                        <input type="tel" id="phone-number" inputmode="tel" autocomplete="tel" placeholder="34 12 345 67" autofocus>
                    </div>
                    <p class="field-error" id="phone-error" hidden>Entre un numéro valide pour ce pays.</p>
                </div>
                <button type="submit">Continuer</button>
            </form>
        </div>

        <div id="otp-screen" class="auth-card hidden">
            <h2>Vérification</h2>
            <p class="subtitle" id="otp-subtitle">Entre le code généré pour ton numéro.</p>

            <form id="otp-form" novalidate>
                <div class="input-group">
                    <label for="otp-code">Code de vérification</label>
                    <input type="text" id="otp-code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="• • • • • •">
                    <p class="field-error" id="otp-error" hidden>Code incorrect, réessaie.</p>
                </div>
                <button type="submit" id="otp-submit-btn">Vérifier le numéro</button>
            </form>
            <button type="button" id="btn-resend" class="btn-secondary" disabled>Renvoyer le code (60s)</button>
            <button type="button" id="btn-back" class="btn-secondary">Modifier le numéro</button>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="otp-toast" class="otp-toast" role="status" aria-live="assertive">
        <div class="otp-toast-icon">S</div>
        <div class="otp-toast-text">
            <span class="otp-toast-title">SocialConnect • Code de vérification</span>
            <span class="otp-toast-code" id="otp-toast-code">------</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getFirestore,
            doc,
            setDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCPcjWWpj4Oy_thZVcPP1i-WlVXMHW6EvA",
            authDomain: "socialconnect-ea2ac.firebaseapp.com",
            projectId: "socialconnect-ea2ac",
            storageBucket: "socialconnect-ea2ac.firebasestorage.app",
            messagingSenderId: "715050033217",
            appId: "1:715050033217:web:dc86dd1d9a6caaa9b9a6c0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.registerUserInDirectory = async function (fullNumber) {
            try {
                await setDoc(doc(db, 'users', fullNumber), {
                    phone: fullNumber,
                    createdAt: serverTimestamp()
                }, { merge: true });
            } catch (e) {
                console.warn('Impossible d\'enregistrer le numéro dans l\'annuaire :', e);
            }
        };
    </script>

    <script>
        const phoneScreen = document.getElementById('phone-screen');
        const otpScreen = document.getElementById('otp-screen');
        const phoneForm = document.getElementById('phone-form');
        const otpForm = document.getElementById('otp-form');
        const countrySelect = document.getElementById('country-code');
        const phoneNumberInput = document.getElementById('phone-number');
        const otpCodeInput = document.getElementById('otp-code');
        const btnBack = document.getElementById('btn-back');
        const btnResend = document.getElementById('btn-resend');
        const phoneError = document.getElementById('phone-error');
        const otpError = document.getElementById('otp-error');
        const otpSubtitle = document.getElementById('otp-subtitle');
        const otpSubmitBtn = document.getElementById('otp-submit-btn');
        const continueBtn = phoneForm.querySelector('button[type="submit"]');

        let generatedOTP = '';
        let resendTimer = null;
        let toastTimer = null;
        let otpToastTimer = null;

        function getSelectedCountry() {
            const opt = countrySelect.options[countrySelect.selectedIndex];
            return {
                dial: opt.value,
                minDigits: parseInt(opt.dataset.min, 10),
                placeholder: opt.dataset.placeholder
            };
        }

        countrySelect.addEventListener('change', () => {
            const country = getSelectedCountry();
            phoneNumberInput.placeholder = country.placeholder;
            phoneError.hidden = true;
            phoneNumberInput.classList.remove('invalid');
        });
        phoneNumberInput.placeholder = getSelectedCountry().placeholder;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
        }

        function showOtpNotification(code) {
            const otpToast = document.getElementById('otp-toast');
            document.getElementById('otp-toast-code').textContent = code;
            otpToast.classList.add('show');
            clearTimeout(otpToastTimer);
            otpToastTimer = setTimeout(() => otpToast.classList.remove('show'), 13000);
        }

        function onlyDigits(value) {
            return value.replace(/\D/g, '');
        }

        function generateOtp() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function startResendCountdown() {
            let seconds = 60;
            btnResend.disabled = true;
            btnResend.textContent = `Renvoyer le code (${seconds}s)`;
            clearInterval(resendTimer);
            resendTimer = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(resendTimer);
                    btnResend.disabled = false;
                    btnResend.textContent = 'Renvoyer le code';
                } else {
                    btnResend.textContent = `Renvoyer le code (${seconds}s)`;
                }
            }, 1000);
        }

        phoneForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const country = getSelectedCountry();
            const digits = onlyDigits(phoneNumberInput.value);

            if (digits.length < country.minDigits) {
                phoneError.hidden = false;
                phoneNumberInput.classList.add('invalid');
                phoneNumberInput.focus();
                return;
            }
            phoneError.hidden = true;
            phoneNumberInput.classList.remove('invalid');
            phoneNumberInput.blur();
            window.scrollTo(0, 0);

            generatedOTP = generateOtp();
            showOtpNotification(generatedOTP);

            otpCodeInput.value = '';
            otpCodeInput.classList.remove('invalid');
            otpError.hidden = true;
            otpSubmitBtn.disabled = false;
            otpSubtitle.textContent = `Entre le code généré pour le ${country.dial} ${digits}`;

            phoneScreen.classList.add('hidden');
            otpScreen.classList.remove('hidden');
            startResendCountdown();
            showToast('Code généré');
            setTimeout(() => otpCodeInput.focus(), 300);
        });

        otpCodeInput.addEventListener('input', () => {
            otpCodeInput.value = onlyDigits(otpCodeInput.value).slice(0, 6);
            otpError.hidden = true;
            otpCodeInput.classList.remove('invalid');
        });

        otpForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            if (otpCodeInput.value.length !== 6 || otpCodeInput.value !== generatedOTP) {
                otpError.textContent = 'Code incorrect, réessaie.';
                otpError.hidden = false;
                otpCodeInput.classList.add('invalid');
                otpScreen.classList.add('shake');
                setTimeout(() => otpScreen.classList.remove('shake'), 400);
                otpCodeInput.focus();
                otpCodeInput.select();
                return;
            }

            clearInterval(resendTimer);
            showToast('Numéro vérifié — bienvenue !');
            const country = getSelectedCountry();
            const digits = onlyDigits(phoneNumberInput.value);
            const fullNumberNoSpace = `${country.dial}${digits}`;
            const fullNumber = `${country.dial} ${digits}`;
            if (window.registerUserInDirectory) {
                await window.registerUserInDirectory(fullNumberNoSpace);
            }
            setTimeout(() => {
                window.location.replace(`accueil.html?phone=${encodeURIComponent(fullNumber)}`);
            }, 600);
        });

        btnBack.addEventListener('click', () => {
            clearInterval(resendTimer);
            otpScreen.classList.add('hidden');
            phoneScreen.classList.remove('hidden');
            phoneNumberInput.focus();
        });

        btnResend.addEventListener('click', () => {
            if (btnResend.disabled) return;
            otpCodeInput.blur();
            generatedOTP = generateOtp();
            showOtpNotification(generatedOTP);
            otpCodeInput.value = '';
            otpCodeInput.classList.remove('invalid');
            otpError.hidden = true;
            showToast('Nouveau code généré');
            startResendCountdown();
            setTimeout(() => otpCodeInput.focus(), 300);
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
